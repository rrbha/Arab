<svg width="100%" viewBox="0 0 680 200" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Arab's GitHub Profile Header</title>
  <style>
    .bg { fill: #1a0a2e; }
    .line1 { stroke: #e8a0c8; stroke-width: 0.8; opacity: 0.25; fill: none; }
    .line2 { stroke: #c084d4; stroke-width: 0.6; opacity: 0.18; fill: none; }
    .name { font-family: 'Segoe UI', sans-serif; font-size: 42px; font-weight: 700; fill: #f0d6f5; letter-spacing: 2px; }
    .sub  { font-family: 'Segoe UI', sans-serif; font-size: 16px; font-weight: 400; fill: #d9a8e8; letter-spacing: 1px; }
    .petal { fill: #c96bc9; opacity: 0.85; }
    .petal2 { fill: #e8a0d0; opacity: 0.75; }
    .center { fill: #f5d0f0; }
    .dot { fill: #e879c0; opacity: 0.7; }
    .dot2 { fill: #b06ad4; opacity: 0.6; }
    .dot3 { fill: #f0b8d8; opacity: 0.5; }
  </style>
  <rect width="680" height="200" rx="14" class="bg"/>
  <line x1="0" y1="40" x2="680" y2="40" class="line1"/>
  <line x1="0" y1="80" x2="680" y2="80" class="line2"/>
  <line x1="0" y1="120" x2="680" y2="120" class="line1"/>
  <line x1="0" y1="160" x2="680" y2="160" class="line2"/>
  <line x1="60" y1="0" x2="60" y2="200" class="line2"/>
  <line x1="180" y1="0" x2="180" y2="200" class="line1"/>
  <line x1="500" y1="0" x2="500" y2="200" class="line1"/>
  <line x1="620" y1="0" x2="620" y2="200" class="line2"/>
  <circle cx="30" cy="30" r="3" class="dot"/>
  <circle cx="650" cy="30" r="2.5" class="dot2"/>
  <circle cx="650" cy="170" r="3.5" class="dot"/>
  <circle cx="30" cy="170" r="2" class="dot3"/>
  <circle cx="340" cy="15" r="2" class="dot2"/>
  <circle cx="340" cy="185" r="2" class="dot"/>
  <g transform="translate(68, 42)">
    <ellipse cx="0" cy="-8" rx="6" ry="10" class="petal" transform="rotate(0)"/>
    <ellipse cx="0" cy="-8" rx="6" ry="10" class="petal" transform="rotate(60)"/>
    <ellipse cx="0" cy="-8" rx="6" ry="10" class="petal" transform="rotate(120)"/>
    <ellipse cx="0" cy="-8" rx="6" ry="10" class="petal" transform="rotate(180)"/>
    <ellipse cx="0" cy="-8" rx="6" ry="10" class="petal" transform="rotate(240)"/>
    <ellipse cx="0" cy="-8" rx="6" ry="10" class="petal" transform="rotate(300)"/>
    <circle cx="0" cy="0" r="5" class="center"/>
  </g>
  <g transform="translate(610, 155)">
    <ellipse cx="0" cy="-7" rx="5" ry="9" class="petal2" transform="rotate(0)"/>
    <ellipse cx="0" cy="-7" rx="5" ry="9" class="petal2" transform="rotate(60)"/>
    <ellipse cx="0" cy="-7" rx="5" ry="9" class="petal2" transform="rotate(120)"/>
    <ellipse cx="0" cy="-7" rx="5" ry="9" class="petal2" transform="rotate(180)"/>
    <ellipse cx="0" cy="-7" rx="5" ry="9" class="petal2" transform="rotate(240)"/>
    <ellipse cx="0" cy="-7" rx="5" ry="9" class="petal2" transform="rotate(300)"/>
    <circle cx="0" cy="0" r="4" class="center"/>
  </g>
  <g transform="translate(620, 45)">
    <ellipse cx="0" cy="-5" rx="4" ry="7" class="petal" transform="rotate(0)" opacity="0.6"/>
    <ellipse cx="0" cy="-5" rx="4" ry="7" class="petal" transform="rotate(72)" opacity="0.6"/>
    <ellipse cx="0" cy="-5" rx="4" ry="7" class="petal" transform="rotate(144)" opacity="0.6"/>
    <ellipse cx="0" cy="-5" rx="4" ry="7" class="petal" transform="rotate(216)" opacity="0.6"/>
    <ellipse cx="0" cy="-5" rx="4" ry="7" class="petal" transform="rotate(288)" opacity="0.6"/>
    <circle cx="0" cy="0" r="3.5" class="center"/>
  </g>
  <g transform="translate(55, 158)">
    <ellipse cx="0" cy="-5" rx="4" ry="7" class="petal2" transform="rotate(0)" opacity="0.55"/>
    <ellipse cx="0" cy="-5" rx="4" ry="7" class="petal2" transform="rotate(72)" opacity="0.55"/>
    <ellipse cx="0" cy="-5" rx="4" ry="7" class="petal2" transform="rotate(144)" opacity="0.55"/>
    <ellipse cx="0" cy="-5" rx="4" ry="7" class="petal2" transform="rotate(216)" opacity="0.55"/>
    <ellipse cx="0" cy="-5" rx="4" ry="7" class="petal2" transform="rotate(288)" opacity="0.55"/>
    <circle cx="0" cy="0" r="3" class="center"/>
  </g>
  <text x="340" y="105" text-anchor="middle" class="name">Hi, I'm Arab 🌸</text>
  <text x="340" y="138" text-anchor="middle" class="sub">✦ Aspiring .NET Backend Developer ✦ Lifelong Learner 💜</text>
</svg>
